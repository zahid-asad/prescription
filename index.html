
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rx Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* ============================================================
           DESIGN TOKENS
           ============================================================ */
        :root {
            --navy:     #0d2b52;
            --navy-mid: #1a4480;
            --teal:     #0891b2;
            --teal-lt:  #e0f4f9;
            --accent:   #06b6d4;
            --green:    #059669;
            --green-lt: #d1fae5;
            --red:      #dc2626;
            --bg:       #f0f4f8;
            --surface:  #ffffff;
            --border:   #dde4ec;
            --text-1:   #0f1923;
            --text-2:   #4a5a6b;
            --text-3:   #8a97a5;
            --radius:   12px;
            --radius-sm:8px;
            --shadow-sm: 0 1px 3px rgba(13,43,82,.06), 0 1px 2px rgba(13,43,82,.04);
            --shadow:    0 4px 16px rgba(13,43,82,.08), 0 1px 4px rgba(13,43,82,.04);
            --shadow-lg: 0 12px 40px rgba(13,43,82,.14);
            --shadow-float: 0 8px 30px rgba(13,43,82,.15);
            /* print overlay vars */
            --pen-color: #1a1a1a;
            --size-info:   2cqw;
            --size-vitals: 1.8cqw;
            --size-notes:  2cqw;
            --size-rx:     2.2cqw;
            --size-footer: 1.6cqw;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
        }

        /* ============================================================
           LAYOUT SHELL
           ============================================================ */
        .app-header {
            background: var(--navy);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 2px 12px rgba(13,43,82,.3);
            transition: transform 0.3s ease;
        }

        .app-header.hidden {
            transform: translateY(-100%);
        }

        .app-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .logo-icon {
            width: 32px; height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }

        .logo-icon svg { color: #fff; }

        .lang-pill {
            display: flex;
            background: rgba(255,255,255,.1);
            border-radius: 8px;
            padding: 3px;
            gap: 2px;
        }

        .lang-pill button {
            border: none;
            background: transparent;
            color: rgba(255,255,255,.65);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all .2s;
        }

        .lang-pill button.active {
            background: var(--accent);
            color: #fff;
        }

        /* ============================================================
           FORM VIEW
           ============================================================ */
        #form-view {
            max-width: 740px;
            margin: 0 auto;
            padding: 28px 20px 100px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            padding: 22px 24px;
            animation: fadeUp .35s ease both;
            overflow: hidden; 
            min-width: 0;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .card-title .icon-badge {
            width: 30px; height: 30px;
            background: var(--teal-lt);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: var(--teal);
            flex-shrink: 0;
        }

        .field { position: relative; margin-bottom: 14px; }
        .field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-2); margin-bottom: 5px; letter-spacing: 0.2px; }
        .field input, .field textarea, .field select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 0.95rem; color: var(--text-1); background: #fafcff; transition: border-color .2s, box-shadow .2s, background .2s; appearance: none; }
        .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--teal); background: #fff; box-shadow: 0 0 0 3px rgba(8,145,178,.12); }
        .field textarea { resize: vertical; min-height: 80px; line-height: 1.55; }
        .ltr-input { direction: ltr !important; text-align: left !important; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 560px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 380px) { .grid-2 { grid-template-columns: 1fr; } }

        /* Vertical Calendar Toggle */
        .cal-label { font-size: 0.6rem; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: color 0.2s; }
        .cal-label.active { color: var(--teal); }

        /* Toggle switch */
        .toggle-switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
        .toggle-switch.small { width: 30px; height: 16px; margin: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 11px; transition: background .2s; cursor: pointer; }
        .toggle-track::after { content: ''; position: absolute; left: 3px; top: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
        .toggle-switch.small .toggle-track::after { width: 12px; height: 12px; left: 2px; top: 2px; }
        .toggle-switch input:checked + .toggle-track { background: var(--teal); }
        .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }
        .toggle-switch.small input:checked + .toggle-track::after { transform: translateX(14px); }

        /* Vitals inline table */
        .vitals-table { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; min-width: 0; }
        .vital-row { display: flex; align-items: center; gap: 6px; background: #fafcff; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; transition: border-color .2s, box-shadow .2s, background .2s; min-width: 0; overflow: hidden; }
        .vital-row:focus-within { border-color: var(--teal); background: #fff; box-shadow: 0 0 0 3px rgba(8,145,178,.12); }
        .vital-tag { font-size: 0.72rem; font-weight: 800; color: var(--teal); width: 36px; flex-shrink: 0; letter-spacing: 0.2px; white-space: nowrap; }
        .vital-row input { flex: 1; border: none; background: transparent; font-family: inherit; font-size: 0.9rem; font-weight: 600; color: var(--text-1); outline: none; min-width: 0; width: 0; padding: 0; direction: ltr; }
        .vital-full { grid-column: 1 / -1; }

        /* Dynamic Rx Form Elements */
        .rx-entry { background: #fafcff; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 12px; transition: border-color .2s, box-shadow .2s; }
        .rx-entry:focus-within { border-color: var(--teal); }
        .rx-entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .rx-entry-title { font-size: 0.8rem; font-weight: 700; color: var(--navy); }
        .btn-remove { background: transparent; border: none; color: var(--red); cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .btn-remove:hover { background: #fee2e2; }
        .rx-grid { display: grid; grid-template-columns: 80px 1fr 90px; gap: 8px; margin-bottom: 8px; }
        .field-input { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 0.9rem; color: var(--text-1); background: #fff; outline: none; transition: all .2s; }
        .field-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(8,145,178,.12); }
        
        @media(max-width: 500px) {
            .rx-grid { grid-template-columns: 80px 1fr; }
            .rx-amount { grid-column: 1 / -1; }
        }

        /* Action Bar */
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,.95); backdrop-filter: blur(12px); border-top: 1px solid var(--border); padding: 12px 20px; display: flex; justify-content: center; z-index: 100; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; padding: 12px 28px; transition: all .2s; letter-spacing: 0.2px; }
        .btn-primary { background: var(--navy); color: #fff; box-shadow: 0 4px 14px rgba(13,43,82,.35); width: 100%; max-width: 420px; font-size: 1rem; }
        .btn-primary:hover { background: var(--navy-mid); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(13,43,82,.4); }
        .btn-ghost { background: var(--surface); color: var(--text-2); border: 1.5px solid var(--border); }
        .btn-ghost:hover { border-color: var(--navy); color: var(--navy); }


        /* ============================================================
           PREVIEW VIEW & FLOATING MENU
           ============================================================ */
        #preview-view {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 90px 20px 40px; /* Top padding for floating menu */
            gap: 20px;
        }

        /* Floating Menu */
        .floating-menu {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 500;
            box-shadow: var(--shadow-float);
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: var(--text-2);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: var(--bg);
            color: var(--navy);
        }

        .menu-btn svg { width: 16px; height: 16px; }

        .menu-btn.save-btn {
            background: var(--navy);
            color: #fff;
            padding-right: 12px;
        }
        .menu-btn.save-btn:hover { background: var(--navy-mid); box-shadow: 0 4px 12px rgba(13,43,82,.2); }

        /* Dropdown */
        .dropdown { position: relative; }
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 160px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s;
            z-index: 501;
        }

        .dropdown.open .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-1);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .dropdown-item:hover { background: var(--bg); color: var(--navy); }
        .dropdown-item svg { width: 16px; height: 16px; color: var(--text-2); }
        .dropdown-item:hover svg { color: var(--navy); }

        /* Settings Modal Overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 25, 35, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal-container {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            margin: 20px;
            transform: scale(0.95) translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .modal-overlay.open .modal-container {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            background: var(--navy);
            color: #fff;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { font-size: 1rem; margin: 0; display: flex; align-items: center; gap: 8px;}
        .btn-close-modal {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-close-modal:hover { background: rgba(255,255,255,0.2); }

        .modal-body {
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .controls-row { display: flex; align-items: center; flex-wrap: wrap; gap: 14px; }
        .controls-label { font-size: 0.8rem; font-weight: 700; color: var(--text-2); white-space: nowrap; }

        .swatch-group { display: flex; gap: 8px; align-items: center; }
        .swatch { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; transition: transform .15s, box-shadow .15s; padding: 0; outline: none; }
        .swatch:hover { transform: scale(1.15); }
        .swatch.active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--navy); transform: scale(1.1); }
        .toggle-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .toggle-label { font-size: 0.82rem; font-weight: 600; color: var(--text-2); cursor: pointer; }

        .sliders-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
        .slider-item { display: flex; flex-direction: column; gap: 6px; }
        .slider-item-head { display: flex; justify-content: space-between; align-items: center; }
        .slider-item label { font-size: 0.78rem; font-weight: 600; color: var(--text-2); }
        .slider-val { font-size: 0.75rem; font-weight: 700; color: var(--teal); background: var(--teal-lt); padding: 1px 7px; border-radius: 20px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 5px; border-radius: 3px; background: var(--border); cursor: pointer; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--navy); border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.2); transition: transform .15s; }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        .divider { height: 1px; background: var(--border); }


        /* ============================================================
           PRESCRIPTION CONTAINER
           ============================================================ */
        .prescription-container {
            position: relative; width: 100%; max-width: 800px;
            aspect-ratio: 719 / 1024;
            background-image: url('18624.jpg');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-color: white; box-shadow: var(--shadow-lg); border-radius: 6px;
            container-type: inline-size; overflow: hidden;
        }

        .overlay-text {
            position: absolute; font-family: 'Outfit', 'Noto Naskh Arabic', sans-serif;
            color: var(--pen-color); padding: 0 6px; box-sizing: border-box;
            z-index: 10; white-space: nowrap; overflow: visible; line-height: 1.2;
        }
        .overlay-textarea { display: flex; flex-direction: column; white-space: normal; }

        .txt-info   { font-size: var(--size-info); }
        .txt-vitals { font-size: var(--size-vitals); }
        .txt-notes  { font-size: var(--size-notes); }
        .txt-rx     { font-size: var(--size-rx); font-weight: 500; }

        #top-bar-preview { position: absolute; top: 29.8%; left: 4.5%; width: 91%; height: 3.5%; display: flex; align-items: center; justify-content: space-between; z-index: 10; color: var(--pen-color); }
        .top-bar-item { display: flex; gap: 5px; align-items: center; }
        .top-bar-label { font-weight: 700; }

        #prev-vitals-container { position: absolute; top: 35.0%; left: 4.5%; width: 27%; height: 22%; display: flex; flex-direction: column; justify-content: space-between; z-index: 10; color: var(--pen-color); font-family: 'Outfit', 'Noto Naskh Arabic', sans-serif; }
        .vital-line { display: flex; align-items: baseline; gap: 5px; white-space: nowrap; }

        #prev-record     { top: 62.5%; left: 4.5%; width: 27%; height: 12%; }
        #prev-impression { top: 75.5%; left: 4.5%; width: 27%; height: 12%; }
        
        #prev-rx         { top: 40%;   left: 34%; width: 62%; height: 48%; display: flex; flex-direction: column; gap: 1.5cqw; overflow: hidden; }

        .overlay-section-head { display: block; font-size: calc(var(--size-notes) * 1.2); font-weight: 700; line-height: 1.4; padding-bottom: 2px; margin-bottom: 4px; white-space: nowrap; }
        .overlay-section-body { font-size: var(--size-notes); white-space: pre-wrap; line-height: 1.5; }

        /* Dynamic Structured Rx Styling */
        .prev-rx-item { display: flex; flex-direction: column; gap: 0.6cqw; line-height: 1.35; }
        .rx-row-1 { display: flex; align-items: baseline; width: 100%; gap: 1cqw; }
        .rx-num { width: 2.5cqw; font-weight: 700; flex-shrink: 0; }
        .rx-drug { flex: 1; display: flex; gap: 0.8cqw; align-items: baseline; }
        .rx-type { font-weight: 700; }
        .rx-name { }
        .rx-amount { font-weight: 700; flex-shrink: 0; padding-left: 1cqw; }
        .rx-row-2 { display: flex; align-items: baseline; gap: 0.8cqw; padding-left: 3.5cqw; }
        .rx-inst-icon { font-size: 0.85em; font-weight: bold; }

        .force-bold .overlay-section-head, .force-bold .overlay-section-body, .force-bold .overlay-text, .force-bold .overlay-textarea, .force-bold .top-bar-value, .force-bold .top-bar-label, .force-bold .footer-line, .force-bold .vital-line span, .force-bold .rx-name, .force-bold .rx-row-2 { font-weight: 700 !important; }

        #prev-footer { position: absolute; bottom: 5.5%; left: 5%; width: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 10; color: var(--pen-color); font-family: 'Outfit', 'Noto Naskh Arabic', sans-serif; }
        #prev-address { display: flex; flex-direction: column; align-items: center; }
        .footer-line  { font-size: var(--size-footer); line-height: 1.4; }
        .footer-phone { font-size: calc(var(--size-footer) * 0.9); direction: ltr; margin-top: 4px; font-weight: 700; }

        .rx-bordered::after { content: ''; position: absolute; inset: 10px; border: 1pt solid rgba(30,30,30,0.55); border-radius: 3px; pointer-events: none; z-index: 50; }

        /* ============================================================
           PRINT STYLES
           ============================================================ */
        @media print {
            @page { size: A4; margin: 0; }
            html, body {
                width: 210mm; height: 297mm;
                margin: 0; padding: 0;
                background: white; overflow: hidden;
            }
            .app-header, #form-view, .floating-menu,
            #settings-modal, .toast { display: none !important; }

            #preview-view { display: block !important; padding: 0 !important; }

            .prescription-container {
                width: 210mm !important;
                height: 297mm !important;
                max-width: none !important;
                aspect-ratio: auto;
                background-size: 100% 100%;
                box-shadow: none; border-radius: 0;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--navy); color: #fff; padding: 12px 22px; border-radius: 100px; font-size: 0.87rem; font-weight: 600; box-shadow: 0 8px 24px rgba(13,43,82,.35); z-index: 9999; transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s; opacity: 0; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

<!-- ================================================================
     APP HEADER
     ================================================================ -->
<header class="app-header" id="app-header">
    <div class="logo">
        <div class="logo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
            </svg>
        </div>
        <span>Rx Generator</span>
    </div>
    <div class="lang-pill">
        <button id="lang-ps" class="active" onclick="switchLang('ps')">پښتو</button>
        <button id="lang-en" onclick="switchLang('en')">EN</button>

<script>
    /* ---- Translation dictionary ---- */
    const T = {
        en: {
            sec_patient:"Patient Information", lbl_name:"Name", ph_name:"Patient Name",
            lbl_date:"Date", lbl_age:"Age / DOB", ph_age:"Age or DOB",
            lbl_sex:"Sex", ph_sex:"Male / Female",
            sec_vitals:"Vitals", lbl_weight:"Weight",
            sec_notes:"Clinical Notes",
            lbl_record:"Clinical Record", ph_record:"Enter clinical record...",
            lbl_impression:"Impression", ph_impression:"Enter impression...",
            sec_rx:"Prescription (Rx)", 
            btn_add_rx:"+ Add Medicine", lbl_medicine:"Medicine",
            ph_drug_name:"Drug name & strength", ph_amount:"Amount (e.g. N=30)", ph_instructions:"Instructions (e.g. 1x2 After meal)",
            btn_preview:"Preview & Print", btn_edit:"Edit", btn_edit_float:"Edit", btn_settings_float:"Settings",
            font_title:"Print Options",
            color_label:"Pen Color:", bold_label:"Bold Text", address_label:"Show Address",
            sl_info:"Top Info", sl_vitals:"Vitals", sl_notes:"Notes", sl_rx:"Prescription",
            sec_address:"Address & Contact", lbl_address:"Clinic Address", lbl_phone:"Phone Numbers",
            border_label:"Border"
        },
        ps: {
            sec_patient:"د ناروغ معلومات", lbl_name:"اسم", ph_name:"اسم مریض",
            lbl_date:"تاریخ", lbl_age:"سن", ph_age:"سن مریض",
            lbl_sex:"جنس", ph_sex:"نارینه / ښځینه",
            sec_vitals:"حیاتي نښې", lbl_weight:"وزن",
            sec_notes:"کلینیکي یادښتونه",
            lbl_record:"کلینیکي ریکارډ", ph_record:"کلینیکي ریکارډ ولیکئ...",
            lbl_impression:"تشخیص (Impression)", ph_impression:"تشخیص ولیکئ...",
            sec_rx:"نسخه (Rx)", 
            btn_add_rx:"+ درمل اضافه کړئ", lbl_medicine:"درمل",
            ph_drug_name:"د درملو نوم او ځواک", ph_amount:"مقدار (لکه N=30)", ph_instructions:"لارښوونې (لکه ۱x۲ له ډوډۍ وروسته)",
            btn_preview:"مخکتنه او چاپ", btn_edit:"سمون (Edit)", btn_edit_float:"سمون", btn_settings_float:"تنظیمات",
            font_title:"د چاپ دمخه د متن اختیارونه",
            color_label:"د قلم رنګ:", bold_label:"ټول Bold کړئ", address_label:"پته ښودل",
            sl_info:"لوړ معلومات", sl_vitals:"حیاتي نښې", sl_notes:"یادښتونه", sl_rx:"نسخه (Rx)",
            sec_address:"آدرس او تلیفون", lbl_address:"د کلینیک آدرس", lbl_phone:"د تلیفون شمیرې",
            border_label:"بارډر"
        }
    };

    let currentLang = 'ps';
    let rxCount = 0;

    function switchLang(lang) {
        currentLang = lang;
        const dict = T[lang];
        
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const k = el.getAttribute('data-i18n');
            if (dict[k]) el.textContent = dict[k];
        });
        document.querySelectorAll('[data-i18n-ph]').forEach(el => {
            const k = el.getAttribute('data-i18n-ph');
            if (dict[k]) el.setAttribute('placeholder', dict[k]);
        });
        
        const dir = lang === 'ps' ? 'rtl' : 'ltr';
        ['form-name','form-sex','form-record','form-impression'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.dir = dir;
        });
        
        document.getElementById('lang-ps').classList.toggle('active', lang === 'ps');
        document.getElementById('lang-en').classList.toggle('active', lang === 'en');
        
        // Update dynamic Rx fields
        document.getElementById('btn-add-rx').textContent = dict.btn_add_rx;
        document.querySelectorAll('.rx-entry').forEach((entry, idx) => {
            entry.querySelector('.rx-entry-title').textContent = `${dict.lbl_medicine} ${idx + 1}`;
            entry.querySelector('.rx-name').placeholder = dict.ph_drug_name;
            entry.querySelector('.rx-amount').placeholder = dict.ph_amount;
            entry.querySelector('.rx-instructions').placeholder = dict.ph_instructions;
            entry.querySelector('.rx-instructions').dir = dir;
        });
    }

    function setCalendarToggle(isPersian) {
        document.getElementById('date-toggle').checked = isPersian;
        updateAutoDate();
    }

    function updateAutoDate() {
        try {
            const isPersian = document.getElementById('date-toggle').checked;
            document.getElementById('lbl-gregorian').classList.toggle('active', !isPersian);
            document.getElementById('lbl-persian').classList.toggle('active', isPersian);

            const calendar = isPersian ? 'persian' : 'gregory';
            const fmt = new Intl.DateTimeFormat('en-US-u-ca-' + calendar, {year:'numeric',month:'2-digit',day:'2-digit'});
            const p = fmt.formatToParts(new Date());
            
            const y = p.find(x => x.type === 'year' || x.type === 'relatedYear')?.value || '';
            const m = p.find(x => x.type === 'month')?.value || '';
            const d = p.find(x => x.type === 'day')?.value || '';
            
            if (y && m && d) document.getElementById('form-date').value = `${y}/${m}/${d}`;
        } catch(e) {}
    }

    /* ---- Structured Rx Entry Logic ---- */
    function addRxEntry() {
        rxCount++;
        const dict = T[currentLang];
        const container = document.getElementById('rx-entries-container');
        const entry = document.createElement('div');
        entry.className = 'rx-entry';
        const dir = currentLang === 'ps' ? 'rtl' : 'ltr';

        entry.innerHTML = `
            <div class="rx-entry-header">
                <span class="rx-entry-title">${dict.lbl_medicine} ${rxCount}</span>
                <button type="button" class="btn-remove" onclick="this.parentElement.parentElement.remove(); updateRxNumbers();" title="Remove">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="rx-grid" dir="ltr">
                <select class="rx-type field-input">
                    <option value="Tab">Tab</option>
                    <option value="Cap">Cap</option>
                    <option value="Syr">Syr</option>
                    <option value="Susp">Susp</option>
                    <option value="Amp">Amp</option>
                    <option value="Vial">Vial</option>
                    <option value="Drops">Drops</option>
                    <option value="Oint">Oint</option>
                    <option value="Cream">Cream</option>
                    <option value="Supp">Supp</option>
                    <option value="Sachet">Sachet</option>
                    <option value="Puff">Puff</option>
                    <option value="IV">IV</option>
                    <option value="IM">IM</option>
                    <option value="">(None)</option>
                </select>
                <input type="text" class="rx-name field-input" placeholder="${dict.ph_drug_name}">
                <input type="text" class="rx-amount field-input" placeholder="${dict.ph_amount}">
            </div>
            <div>
                <input type="text" class="rx-instructions field-input" dir="${dir}" placeholder="${dict.ph_instructions}">
            </div>
        `;
        container.appendChild(entry);
        updateRxNumbers();
    }

    function updateRxNumbers() {
        const dict = T[currentLang];
        const entries = document.querySelectorAll('.rx-entry');
        entries.forEach((entry, index) => {
            entry.querySelector('.rx-entry-title').textContent = `${dict.lbl_medicine} ${index + 1}`;
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        switchLang('ps');
        updateAutoDate();
        initSliders();
        addRxEntry(); 
        addRxEntry();

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('save-dropdown-container');
            if (dropdown && !dropdown.contains(event.target)) {
                dropdown.classList.remove('open');
            }
        });
    });

    document.getElementById('form-date').addEventListener('input', function(e) {
        let v = e.target.value.replace(/[^\d۰-۹٠-٩]/g,'');
        let f = '';
        if (v.length > 0) f += v.substring(0,4);
        if (v.length > 4) f += '/' + v.substring(4,6);
        if (v.length > 6) f += '/' + v.substring(6,8);
        e.target.value = f;
    });

    /* ---- Live controls ---- */
    const rs = document.documentElement.style;

    function setPenColor(color, btn) {
        rs.setProperty('--pen-color', color);
        document.querySelectorAll('.swatch').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function toggleBold(cb) { document.getElementById('prescriptionContainer').classList.toggle('force-bold', cb.checked); }
    function toggleAddress(cb) { document.getElementById('prev-address').style.display = cb.checked ? 'flex' : 'none'; }
    function toggleBorder(cb) { document.getElementById('prescriptionContainer').classList.toggle('rx-bordered', cb.checked); }

    function initSliders() {
        const sliders = [
            { id:'size-info',   cssVar:'--size-info',   valEl:'val-info' },
            { id:'size-vitals', cssVar:'--size-vitals', valEl:'val-vitals' },
            { id:'size-notes',  cssVar:'--size-notes',  valEl:'val-notes' },
            { id:'size-rx',     cssVar:'--size-rx',     valEl:'val-rx' },
        ];
        sliders.forEach(({id, cssVar, valEl}) => {
            const el = document.getElementById(id);
            const disp = document.getElementById(valEl);
            el.addEventListener('input', e => {
                rs.setProperty(cssVar, e.target.value + 'cqw');
                if (disp) disp.textContent = parseFloat(e.target.value).toFixed(1);
            });
        });
    }

    /* ---- View switching & Modals ---- */
    function generatePreview() {
        const dict = T[currentLang];

        const vitals = [
            { form:'form-bp',     label:'BP'     }, { form:'form-pr',     label:'PR'     },
            { form:'form-hr',     label:'HR'     }, { form:'form-rr',     label:'RR'     },
            { form:'form-temp',   label:'Temp'   }, { form:'form-spo2',   label:'SpO₂'  },
            { form:'form-weight', label:'Weight' },
        ];
        document.getElementById('prev-vitals-container').innerHTML = vitals.map(({ form, label }) => `
            <div class="vital-line">
                <span style="font-size: var(--size-notes); font-weight: 700;">${label}</span>
                <span style="font-size: var(--size-notes); font-weight: 700;">=</span>
                <span style="font-size: var(--size-vitals);">${document.getElementById(form).value || ''}</span>
            </div>
        `).join('');

        document.getElementById('prev-record').innerHTML =
            `<span class="overlay-section-head">Clinical Records</span><span class="overlay-section-body">${escHtml(document.getElementById('form-record').value)}</span>`;

        document.getElementById('prev-impression').innerHTML =
            `<span class="overlay-section-head">Impression</span><span class="overlay-section-body">${escHtml(document.getElementById('form-impression').value)}</span>`;

        // Structured Rx Generation
        const rxEntries = document.querySelectorAll('.rx-entry');
        let rxHtml = '';
        rxEntries.forEach((entry, idx) => {
            const type = entry.querySelector('.rx-type').value;
            const name = entry.querySelector('.rx-name').value;
            const amount = entry.querySelector('.rx-amount').value;
            const inst = entry.querySelector('.rx-instructions').value;

            if(!name && !type && !inst) return; 

            rxHtml += `
                <div class="prev-rx-item">
                    <div class="rx-row-1">
                        <div class="rx-num">${idx + 1}</div>
                        <div class="rx-drug">
                            ${type ? `<span class="rx-type">${escHtml(type)}</span>` : ''}
                            <span class="rx-name">${escHtml(name)}</span>
                        </div>
                        ${amount ? `<div class="rx-amount">${escHtml(amount)}</div>` : ''}
                    </div>
                    ${inst ? `
                    <div class="rx-row-2" dir="${currentLang === 'ps' ? 'rtl' : 'ltr'}">
                        <span class="rx-inst-icon">&#10003;</span> 
                        <span>${escHtml(inst)}</span>
                    </div>` : ''}
                </div>
            `;
        });
        document.getElementById('prev-rx').innerHTML = rxHtml;

        const topBar = document.getElementById('top-bar-preview');
        topBar.dir = currentLang === 'ps' ? 'rtl' : 'ltr';
        topBar.innerHTML = `
            <div class="top-bar-item"><span class="top-bar-label">${dict.lbl_name}:</span><span class="top-bar-value">${escHtml(document.getElementById('form-name').value)}</span></div>
            <div class="top-bar-item"><span class="top-bar-label">${dict.lbl_age}:</span><span class="top-bar-value">${escHtml(document.getElementById('form-age').value)}</span></div>
            <div class="top-bar-item"><span class="top-bar-label">${dict.lbl_sex}:</span><span class="top-bar-value">${escHtml(document.getElementById('form-sex').value)}</span></div>
            <div class="top-bar-item"><span class="top-bar-label">${currentLang==='ps'?'تاریخ':'Date'}:</span><span class="top-bar-value">${escHtml(document.getElementById('form-date').value)}</span></div>`;

        // Switch views and hide top header
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('preview-view').style.display = 'flex';
        document.getElementById('app-header').classList.add('hidden');
        window.scrollTo(0, 0);

        const addrVal = document.getElementById('form-address').value.trim();
        const phoneVal = document.getElementById('form-phone').value.trim();
        document.getElementById('prev-address').innerHTML = addrVal ? `<span class="footer-line">${escHtml(addrVal).replace(/\n/g,'<br>')}</span>` : '';
        document.getElementById('prev-phone').textContent = phoneVal ? 'Phone: ' + phoneVal : '';
    }

    function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    
    function backToEdit() { 
        document.getElementById('preview-view').style.display = 'none'; 
        document.getElementById('form-view').style.display = 'flex'; 
        document.getElementById('app-header').classList.remove('hidden');
    }

    function openSettings() { document.getElementById('settings-modal').classList.add('open'); }
    function closeSettings(e) { 
        if(e && e.target !== e.currentTarget) return; // Prevent closing when clicking inside
        document.getElementById('settings-modal').classList.remove('open'); 
    }
    
    function toggleDropdown(e) {
        e.stopPropagation();
        document.getElementById('save-dropdown-container').classList.toggle('open');
    }

    function showToast(msg, icon = '✓') { const el = document.getElementById('toast'); el.innerHTML = `<span>${icon}</span>${msg}`; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2800); }

    function getFileName(extension) {
        let name = document.getElementById('form-name').value.trim();
        if(!name) return `Prescription.${extension}`;
        name = name.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_\u0600-\u06FF]/g, '');
        return `${name}.${extension}`;
    }

    /* ---- Exports ---- */
    async function downloadPDF() {
        document.getElementById('save-dropdown-container').classList.remove('open');
        showToast('Generating PDF...', '⏳');

        try {
            const { jsPDF } = window.jspdf;
            const container = document.getElementById('prescriptionContainer');
            const savedW = container.style.width; const savedMW = container.style.maxWidth;
            container.style.width = '800px'; container.style.maxWidth = '800px';
            await new Promise(r => setTimeout(r, 150));

            const canvas = await html2canvas(container, {
                scale: 6, useCORS: true, backgroundColor: '#ffffff', logging: false, allowTaint: false, letterRendering: true, imageTimeout: 0
            });
            container.style.width = savedW; container.style.maxWidth = savedMW;

            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF({ orientation:'p', unit:'mm', format:'a4' });
            pdf.addImage(imgData, 'PNG', 0, 0, 210, 297, '', 'FAST');
            pdf.save(getFileName('pdf'));
            showToast('PDF downloaded successfully');
        } catch(err) {
            console.error(err); showToast('Export error — please retry', '✕');
        }
    }

    async function downloadImage() {
        document.getElementById('save-dropdown-container').classList.remove('open');
        showToast('Generating Image...', '🖼️');

        try {
            const container = document.getElementById('prescriptionContainer');
            const savedW = container.style.width; const savedMW = container.style.maxWidth;
            container.style.width = '800px'; container.style.maxWidth = '800px';
            await new Promise(r => setTimeout(r, 150));

            const canvas = await html2canvas(container, {
                scale: 4, // 4x scale is excellent for standard PNG viewing
                useCORS: true, backgroundColor: '#ffffff', logging: false, allowTaint: false, letterRendering: true
            });
            container.style.width = savedW; container.style.maxWidth = savedMW;

            const imgData = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = getFileName('png');
            link.href = imgData;
            link.click();
            
            showToast('Image downloaded successfully');
        } catch(err) {
            console.error(err); showToast('Export error — please retry', '✕');
        }
    }
</script>
</body>
</html>
