<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rx Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* ============================================================
           DESIGN TOKENS
           ============================================================ */
        :root {
            --navy:     #0d2b52;
            --navy-mid: #1a4480;
            --teal:     #0891b2;
            --teal-lt:  #e0f4f9;
            --accent:   #06b6d4;
            --green:    #059669;
            --green-lt: #d1fae5;
            --red:      #dc2626;
            --bg:       #f0f4f8;
            --surface:  #ffffff;
            --border:   #dde4ec;
            --text-1:   #0f1923;
            --text-2:   #4a5a6b;
            --text-3:   #8a97a5;
            --radius:   12px;
            --radius-sm:8px;
            --shadow-sm: 0 1px 3px rgba(13,43,82,.06), 0 1px 2px rgba(13,43,82,.04);
            --shadow:    0 4px 16px rgba(13,43,82,.08), 0 1px 4px rgba(13,43,82,.04);
            --shadow-lg: 0 12px 40px rgba(13,43,82,.14);
            /* print overlay vars */
            --pen-color: #1a1a1a;
            --size-info:   2cqw;
            --size-vitals: 1.8cqw;
            --size-notes:  2cqw;
            --size-rx:     2.2cqw;
            --size-footer: 1.6cqw;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
        }

        /* ============================================================
           LAYOUT SHELL
           ============================================================ */
        .app-header {
            background: var(--navy);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 2px 12px rgba(13,43,82,.3);
        }

        .app-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .logo-icon {
            width: 32px; height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }

        .logo-icon svg { color: #fff; }

        .lang-pill {
            display: flex;
            background: rgba(255,255,255,.1);
            border-radius: 8px;
            padding: 3px;
            gap: 2px;
        }

        .lang-pill button {
            border: none;
            background: transparent;
            color: rgba(255,255,255,.65);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all .2s;
        }

        .lang-pill button.active {
            background: var(--accent);
            color: #fff;
        }

        /* ============================================================
           FORM VIEW
           ============================================================ */
        #form-view {
            max-width: 740px;
            margin: 0 auto;
            padding: 28px 20px 100px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .step-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--teal);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            padding: 22px 24px;
            animation: fadeUp .35s ease both;
            overflow: hidden;   /* prevents any child from breaking the frame */
            min-width: 0;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .card-title .icon-badge {
            width: 30px; height: 30px;
            background: var(--teal-lt);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: var(--teal);
            flex-shrink: 0;
        }

        /* Floating label inputs */
        .field {
            position: relative;
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 5px;
            letter-spacing: 0.2px;
        }

        .field input,
        .field textarea,
        .field select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-1);
            background: #fafcff;
            transition: border-color .2s, box-shadow .2s, background .2s;
            appearance: none;
        }

        .field input:focus,
        .field textarea:focus,
        .field select:focus {
            outline: none;
            border-color: var(--teal);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(8,145,178,.12);
        }

        .field textarea { resize: vertical; min-height: 80px; line-height: 1.55; }
        .field #form-rx { min-height: 150px; font-size: 1rem; }

        .ltr-input { direction: ltr !important; text-align: left !important; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

        @media (max-width: 560px) {
            .grid-2 { grid-template-columns: 1fr 1fr; }
            .grid-3 { grid-template-columns: 1fr 1fr; }
            .grid-4 { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 380px) {
            .grid-2 { grid-template-columns: 1fr; }
            .grid-3 { grid-template-columns: 1fr 1fr; }
            .grid-4 { grid-template-columns: 1fr 1fr; }
        }

        /* Calendar Toggle */
        .date-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .date-header label {
            margin-bottom: 0; 
        }

        .calendar-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fafcff;
            border: 1px solid var(--border);
            padding: 3px 8px;
            border-radius: 20px;
        }

        .cal-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .cal-label.active {
            color: var(--teal);
        }

        /* Vitals inline table */
        .vitals-table {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
            min-width: 0;
        }

        .vital-row {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fafcff;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            transition: border-color .2s, box-shadow .2s, background .2s;
            min-width: 0;
            overflow: hidden;
        }

        .vital-row:focus-within {
            border-color: var(--teal);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(8,145,178,.12);
        }

        .vital-tag {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--teal);
            width: 36px;
            flex-shrink: 0;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        .vital-row input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-1);
            outline: none;
            min-width: 0;
            width: 0;       /* forces flex shrink to work correctly */
            padding: 0;
            direction: ltr;
        }

        .vital-full { grid-column: 1 / -1; }

        /* ============================================================
           ACTION BAR
           ============================================================ */
        .action-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            padding: 12px 28px;
            transition: all .2s;
            letter-spacing: 0.2px;
        }

        .btn-primary {
            background: var(--navy);
            color: #fff;
            box-shadow: 0 4px 14px rgba(13,43,82,.35);
            width: 100%;
            max-width: 420px;
            font-size: 1rem;
        }

        .btn-primary:hover { background: var(--navy-mid); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(13,43,82,.4); }
        .btn-primary:active { transform: none; }

        .btn-ghost {
            background: var(--surface);
            color: var(--text-2);
            border: 1.5px solid var(--border);
        }

        .btn-ghost:hover { border-color: var(--navy); color: var(--navy); }

        .btn-teal { background: var(--teal); color: #fff; box-shadow: 0 3px 10px rgba(8,145,178,.3); }
        .btn-teal:hover { background: #0770a0; transform: translateY(-1px); }

        .btn-green { background: var(--green); color: #fff; box-shadow: 0 3px 10px rgba(5,150,105,.3); }
        .btn-green:hover { background: #047a56; transform: translateY(-1px); }

        .btn:disabled { opacity: .55; cursor: not-allowed; transform: none !important; }

        /* ============================================================
           PREVIEW VIEW
           ============================================================ */
        #preview-view {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px 40px;
            gap: 20px;
        }

        .preview-toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 800px;
            justify-content: center;
        }

        /* Controls panel */
        .controls-panel {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .controls-panel-header {
            background: var(--navy);
            color: #fff;
            padding: 12px 20px;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls-panel-body {
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .controls-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }

        .controls-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-2);
            white-space: nowrap;
        }

        /* Color swatches */
        .swatch-group { display: flex; gap: 8px; align-items: center; }

        .swatch {
            width: 26px; height: 26px;
            border-radius: 50%;
            border: 2.5px solid transparent;
            cursor: pointer;
            transition: transform .15s, box-shadow .15s;
            padding: 0;
            outline: none;
        }

        .swatch:hover { transform: scale(1.15); }

        .swatch.active {
            box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--navy);
            transform: scale(1.1);
        }

        /* Toggle switch */
        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            width: 38px; height: 22px;
            flex-shrink: 0;
        }
        
        .toggle-switch.small {
            width: 30px; height: 16px;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .toggle-track {
            position: absolute;
            inset: 0;
            background: var(--border);
            border-radius: 11px;
            transition: background .2s;
            cursor: pointer;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            left: 3px; top: 3px;
            width: 16px; height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform .2s;
            box-shadow: 0 1px 3px rgba(0,0,0,.2);
        }

        .toggle-switch.small .toggle-track::after {
            width: 12px; height: 12px;
            left: 2px; top: 2px;
        }

        .toggle-switch input:checked + .toggle-track { background: var(--teal); }
        .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }
        .toggle-switch.small input:checked + .toggle-track::after { transform: translateX(14px); }

        .toggle-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-2);
            cursor: pointer;
        }

        /* Slider controls */
        .sliders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
        }

        .slider-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .slider-item-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-item label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-2);
        }

        .slider-val {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--teal);
            background: var(--teal-lt);
            padding: 1px 7px;
            border-radius: 20px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: var(--border);
            cursor: pointer;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: var(--navy);
            border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,.2);
            transition: transform .15s;
        }

        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        input[type="range"]::-webkit-slider-runnable-track { border-radius: 3px; }

        /* Divider */
        .divider { height: 1px; background: var(--border); }

        /* ============================================================
           PRESCRIPTION CONTAINER (the actual pad)
           ============================================================ */
        .prescription-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 719 / 1024;
            background-image: url('18624.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: white;
            box-shadow: var(--shadow-lg);
            border-radius: 6px;
            container-type: inline-size;
            overflow: hidden;
        }

        /* Overlays */
        .overlay-text {
            position: absolute;
            font-family: 'Outfit', 'Noto Naskh Arabic', sans-serif;
            color: var(--pen-color);
            padding: 0 6px;
            box-sizing: border-box;
            z-index: 10;
            white-space: nowrap;
            overflow: visible;
            line-height: 1.2;
        }

        .overlay-textarea {
            display: flex;
            flex-direction: column;
            white-space: normal;   /* inner spans handle their own wrapping */
        }

        .txt-info   { font-size: var(--size-info); }
        .txt-vitals { font-size: var(--size-vitals); }
        .txt-notes  { font-size: var(--size-notes); }
        .txt-rx     { font-size: var(--size-rx); line-height: 1.55; font-weight: 500; }

        #top-bar-preview {
            position: absolute;
            top: 29.8%; left: 4.5%;
            width: 91%; height: 3.5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            color: var(--pen-color);
        }

        .top-bar-item { display: flex; gap: 5px; align-items: center; }
        .top-bar-label { font-weight: 700; }

        /* Positioning */
        #prev-vitals-container {
            position: absolute;
            top: 35.0%; left: 3%;
            width: 28%; height: 22%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            color: var(--pen-color);
            font-family: 'Outfit', 'Noto Naskh Arabic', sans-serif;
        }

        .vital-line {
            display: flex;
            align-items: baseline;
            gap: 5px;
            white-space: nowrap;
        }

        #prev-record     { top: 62.5%; left: 2%; width: 30%; height: 12%; }
        #prev-impression { top: 75.5%; left: 2%; width: 30%; height: 12%; }
        #prev-rx         { top: 40%;   left: 34%; width: 62%; height: 48%; }

        /* Section heading inside overlay areas */
        .overlay-section-head {
            display: block;
            font-size: calc(var(--size-notes) * 1.2);
            font-weight: 700;
            line-height: 1.4;
            padding-bottom: 2px;
            margin-bottom: 4px;
            white-space: nowrap;
        }

        .overlay-section-body {
            font-size: var(--size-notes);
            white-space: pre-wrap;
            line-height: 1.5;
        }

        /* Bold override */
        .force-bold .overlay-section-head,
        .force-bold .overlay-section-body,
        .force-bold .overlay-text,
        .force-bold .overlay-textarea,
        .force-bold .top-bar-value,
        .force-bold .top-bar-label,
        .force-bold .footer-line,
        .force-bold .vital-line span { font-weight: 700 !important; }

        /* Footer */
        #prev-footer {
            position: absolute;
            bottom: 4%; left: 5%;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
            color: var(--pen-color);
            font-family: 'Outfit', 'Noto Naskh Arabic', sans-serif;
        }

        #prev-address {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .footer-line  { font-size: var(--size-footer); line-height: 1.4; }
        .footer-phone { font-size: calc(var(--size-footer) * 0.9); direction: ltr; margin-top: 4px; font-weight: 700; }

        /* Design border toggle */
        .rx-bordered::after {
            content: '';
            position: absolute;
            inset: 5px;
            border: 1pt solid rgba(30,30,30,0.55);
            border-radius: 3px;
            pointer-events: none;
            z-index: 50;
        }

        /* ============================================================
           PRINT STYLES
           ============================================================ */
        @media print {
            @page { size: 210mm 297mm; margin: 0; }

            html, body {
                width: 210mm; height: 297mm;
                margin: 0; padding: 0;
                background: white; overflow: hidden;
            }

            .app-header, #form-view, .preview-toolbar,
            .controls-panel { display: none !important; }

            #preview-view { display: block !important; padding: 0; }

            .prescription-container {
                width: 210mm !important;
                height: 297mm !important;
                max-width: none !important;
                aspect-ratio: auto;
                background-size: 100% 100%;
                box-shadow: none; border-radius: 0;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        /* ============================================================
           TOAST NOTIFICATION
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--navy);
            color: #fff;
            padding: 12px 22px;
            border-radius: 100px;
            font-size: 0.87rem;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(13,43,82,.35);
            z-index: 9999;
            transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
            opacity: 0;
            white-space: nowrap;
            display: flex; align-items: center; gap: 8px;
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ============================================================
           PROGRESS RING ON PDF BUTTON
           ============================================================ */
        .spinner {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- ================================================================
     APP HEADER
     ================================================================ -->
<header class="app-header">
    <div class="logo">
        <div class="logo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
            </svg>
        </div>
        <span>Rx Generator</span>
    </div>
    <div class="lang-pill">
        <button id="lang-ps" class="active" onclick="switchLang('ps')">پښتو</button>
        <button id="lang-en" onclick="switchLang('en')">EN</button>
    </div>
</header>


<!-- ================================================================
     VIEW 1 — DATA ENTRY FORM
     ================================================================ -->
<div id="form-view">

    <!-- Patient Info -->
    <div style="animation-delay:.05s" class="card">
        <div class="card-title">
            <div class="icon-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>

<!-- ================================================================
     JAVASCRIPT
     ================================================================ -->
<script>
    /* ---- Translation dictionary ---- */
    const T = {
        en: {
            sec_patient:"Patient Information", lbl_name:"Name", ph_name:"Patient Name",
            lbl_date:"Date", lbl_age:"Age / DOB", ph_age:"Age or DOB",
            lbl_sex:"Sex", ph_sex:"Male / Female",
            sec_vitals:"Vitals", lbl_weight:"Weight",
            sec_notes:"Clinical Notes",
            lbl_record:"Clinical Record", ph_record:"Enter clinical record...",
            lbl_impression:"Impression", ph_impression:"Enter impression...",
            sec_rx:"Prescription (Rx)", ph_rx:"1. Medicine A - 1x/day\n2. Medicine B - 2x/day",
            btn_preview:"Preview & Print", btn_edit:"Edit",
            btn_print:"Normal Print", btn_pdf:"Download PDF",
            font_title:"Text Options Before Printing",
            color_label:"Pen Color:", bold_label:"Bold All", address_label:"Show Address",
            sl_info:"Top Info", sl_vitals:"Vitals", sl_notes:"Notes", sl_rx:"Prescription",
            sec_address:"Address & Contact", lbl_address:"Clinic Address", lbl_phone:"Phone Numbers",
            border_label:"Border"
        },
        ps: {
            sec_patient:"د ناروغ معلومات", lbl_name:"اسم", ph_name:"اسم مریض",
            lbl_date:"تاریخ", lbl_age:"سن", ph_age:"سن مریض",
            lbl_sex:"جنس", ph_sex:"نارینه / ښځینه",
            sec_vitals:"حیاتي نښې", lbl_weight:"وزن",
            sec_notes:"کلینیکي یادښتونه",
            lbl_record:"کلینیکي ریکارډ", ph_record:"کلینیکي ریکارډ ولیکئ...",
            lbl_impression:"تشخیص (Impression)", ph_impression:"تشخیص ولیکئ...",
            sec_rx:"نسخه (Rx)", ph_rx:"1. Medicine A - 1x/day\n2. Medicine B - 2x/day",
            btn_preview:"مخکتنه او چاپ", btn_edit:"سمون (Edit)",
            btn_print:"عادي چاپ", btn_pdf:"PDF ډاونلوډ کړئ",
            font_title:"د چاپ دمخه د متن اختیارونه",
            color_label:"د قلم رنګ:", bold_label:"ټول Bold کړئ", address_label:"پته ښودل",
            sl_info:"لوړ معلومات", sl_vitals:"حیاتي نښې", sl_notes:"یادښتونه", sl_rx:"نسخه (Rx)",
            sec_address:"آدرس او تلیفون", lbl_address:"د کلینیک آدرس", lbl_phone:"د تلیفون شمیرې",
            border_label:"بارډر"
        }
    };

    let currentLang = 'ps';

    function switchLang(lang) {
        currentLang = lang;
        const dict = T[lang];
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const k = el.getAttribute('data-i18n');
            if (dict[k]) el.textContent = dict[k];
        });
        document.querySelectorAll('[data-i18n-ph]').forEach(el => {
            const k = el.getAttribute('data-i18n-ph');
            if (dict[k]) el.setAttribute('placeholder', dict[k]);
        });
        const dir = lang === 'ps' ? 'rtl' : 'ltr';
        ['form-name','form-sex','form-record','form-impression'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.dir = dir;
        });
        document.getElementById('lang-ps').classList.toggle('active', lang === 'ps');
        document.getElementById('lang-en').classList.toggle('active', lang === 'en');
    }

    function setCalendarToggle(isPersian) {
        document.getElementById('date-toggle').checked = isPersian;
        updateAutoDate();
    }

    function updateAutoDate() {
        try {
            const isPersian = document.getElementById('date-toggle').checked;
            
            // Visual active state handling
            document.getElementById('lbl-gregorian').classList.toggle('active', !isPersian);
            document.getElementById('lbl-persian').classList.toggle('active', isPersian);

            const calendar = isPersian ? 'persian' : 'gregory';
            const fmt = new Intl.DateTimeFormat('en-US-u-ca-' + calendar, {year:'numeric',month:'2-digit',day:'2-digit'});
            const date = new Date();
            const p = fmt.formatToParts(date);
            
            // Extracts value reliably while preventing labels from polluting the string
            const y = p.find(x => x.type === 'year' || x.type === 'relatedYear')?.value || '';
            const m = p.find(x => x.type === 'month')?.value || '';
            const d = p.find(x => x.type === 'day')?.value || '';
            
            if (y && m && d) {
                document.getElementById('form-date').value = `${y}/${m}/${d}`;
            }
        } catch(e) {
            console.error("Date formatting error:", e);
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        switchLang('ps');
        updateAutoDate(); // Load default date based on toggle (Gregorian)
        initSliders();
    });

    /* Auto-format date input */
    document.getElementById('form-date').addEventListener('input', function(e) {
        let v = e.target.value.replace(/[^\d۰-۹٠-٩]/g,'');
        let f = '';
        if (v.length > 0) f += v.substring(0,4);
        if (v.length > 4) f += '/' + v.substring(4,6);
        if (v.length > 6) f += '/' + v.substring(6,8);
        e.target.value = f;
    });

    /* ---- Live controls ---- */
    const rs = document.documentElement.style;

    function setPenColor(color, btn) {
        rs.setProperty('--pen-color', color);
        document.querySelectorAll('.swatch').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function toggleBold(cb) {
        document.getElementById('prescriptionContainer').classList.toggle('force-bold', cb.checked);
    }

    function toggleAddress(cb) {
        document.getElementById('prev-address').style.display = cb.checked ? 'flex' : 'none';
    }

    function toggleBorder(cb) {
        document.getElementById('prescriptionContainer').classList.toggle('rx-bordered', cb.checked);
    }

    function initSliders() {
        const sliders = [
            { id:'size-info',   cssVar:'--size-info',   valEl:'val-info' },
            { id:'size-vitals', cssVar:'--size-vitals', valEl:'val-vitals' },
            { id:'size-notes',  cssVar:'--size-notes',  valEl:'val-notes' },
            { id:'size-rx',     cssVar:'--size-rx',     valEl:'val-rx' },
        ];
        sliders.forEach(({id, cssVar, valEl}) => {
            const el = document.getElementById(id);
            const disp = document.getElementById(valEl);
            el.addEventListener('input', e => {
                rs.setProperty(cssVar, e.target.value + 'cqw');
                if (disp) disp.textContent = parseFloat(e.target.value).toFixed(1);
            });
        });
    }

    /* ---- View switching ---- */
    function generatePreview() {
        const dict = T[currentLang];

        // ── Vitals: Render all systematically into flex container
        const vitals = [
            { form:'form-bp',     label:'BP'     },
            { form:'form-pr',     label:'PR'     },
            { form:'form-hr',     label:'HR'     },
            { form:'form-rr',     label:'RR'     },
            { form:'form-temp',   label:'Temp'   },
            { form:'form-spo2',   label:'SpO₂'  },
            { form:'form-weight', label:'Weight' },
        ];
        
        const vitalsHtml = vitals.map(({ form, label }) => {
            const val = document.getElementById(form).value || '';
            return `
                <div class="vital-line">
                    <span style="font-size: var(--size-notes); font-weight: 700;">${label}</span>
                    <span style="font-size: var(--size-notes); font-weight: 700;">=</span>
                    <span style="font-size: var(--size-vitals);">${val}</span>
                </div>
            `;
        }).join('');
        document.getElementById('prev-vitals-container').innerHTML = vitalsHtml;

        // ── Clinical Record: hardcoded heading + body
        const recordVal = document.getElementById('form-record').value;
        document.getElementById('prev-record').innerHTML =
            `<span class="overlay-section-head">Clinical Records</span>` +
            `<span class="overlay-section-body">${escHtml(recordVal)}</span>`;

        // ── Impression: hardcoded heading + body
        const impVal = document.getElementById('form-impression').value;
        document.getElementById('prev-impression').innerHTML =
            `<span class="overlay-section-head">Impression</span>` +
            `<span class="overlay-section-body">${escHtml(impVal)}</span>`;

        // ── Rx (no heading change — background already has Rx)
        document.getElementById('prev-rx').innerText =
            document.getElementById('form-rx').value;

        // ── Top bar (Name / Age / Sex / Date)
        const topBar = document.getElementById('top-bar-preview');
        topBar.dir = currentLang === 'ps' ? 'rtl' : 'ltr';
        const name = document.getElementById('form-name').value;
        const age  = document.getElementById('form-age').value;
        const sex  = document.getElementById('form-sex').value;
        const date = document.getElementById('form-date').value;

        topBar.innerHTML = `
            <div class="top-bar-item">
                <span class="top-bar-label">${dict.lbl_name}:</span>
                <span class="top-bar-value">${escHtml(name)}</span>
            </div>
            <div class="top-bar-item">
                <span class="top-bar-label">${dict.lbl_age}:</span>
                <span class="top-bar-value">${escHtml(age)}</span>
            </div>
            <div class="top-bar-item">
                <span class="top-bar-label">${dict.lbl_sex}:</span>
                <span class="top-bar-value">${escHtml(sex)}</span>
            </div>
            <div class="top-bar-item">
                <span class="top-bar-label">${currentLang==='ps'?'تاریخ':'Date'}:</span>
                <span class="top-bar-value">${escHtml(date)}</span>
            </div>`;

        document.getElementById('form-view').style.display = 'none';
        document.getElementById('preview-view').style.display = 'flex';
        window.scrollTo(0, 0);

        // Update address & phone from form inputs
        const addrEl  = document.getElementById('prev-address');
        const phoneEl = document.getElementById('prev-phone');
        const addrVal = document.getElementById('form-address').value.trim();
        const phoneVal = document.getElementById('form-phone').value.trim();
        addrEl.innerHTML = addrVal
            ? `<span class="footer-line">${escHtml(addrVal).replace(/\n/g,'<br>')}</span>`
            : '';
        phoneEl.textContent = phoneVal ? 'Phone: ' + phoneVal : '';
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function backToEdit() {
        document.getElementById('preview-view').style.display = 'none';
        document.getElementById('form-view').style.display = 'flex';
    }

    /* ---- Toast ---- */
    function showToast(msg, icon = '✓') {
        const el = document.getElementById('toast');
        el.innerHTML = `<span>${icon}</span>${msg}`;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2800);
    }

    /* ---- HD PDF Generation ---- */
    async function downloadPDF() {
        const btn    = document.getElementById('btn-download');
        const spinner = document.getElementById('pdf-spinner');
        const icon   = document.getElementById('pdf-icon');
        const txt    = document.getElementById('pdf-btn-text');

        btn.disabled = true;
        spinner.style.display = 'block';
        icon.style.display    = 'none';
        txt.textContent       = 'Generating…';

        try {
            const { jsPDF } = window.jspdf;
            const container = document.getElementById('prescriptionContainer');

            /* Force pixel-exact size for capture */
            const savedW = container.style.width;
            const savedMW = container.style.maxWidth;
            container.style.width    = '800px';
            container.style.maxWidth = '800px';

            /* Brief layout settle */
            await new Promise(r => setTimeout(r, 150));

            const canvas = await html2canvas(container, {
                scale:           6,
                useCORS:         true,
                backgroundColor: '#ffffff',
                logging:         false,
                allowTaint:      false,
                letterRendering: true,
                imageTimeout:    0
            });

            container.style.width    = savedW;
            container.style.maxWidth = savedMW;

            const imgData = canvas.toDataURL('image/png');
            const pdf     = new jsPDF({ orientation:'p', unit:'mm', format:'a4' });
            pdf.addImage(imgData, 'PNG', 0, 0, 210, 297, '', 'FAST');
            pdf.save('Prescription.pdf');

            showToast('PDF saved successfully');
        } catch(err) {
            console.error(err);
            showToast('PDF error — please retry', '✕');
        } finally {
            btn.disabled          = false;
            spinner.style.display = 'none';
            icon.style.display    = 'block';
            txt.setAttribute('data-i18n', 'btn_pdf');
            txt.textContent = T[currentLang].btn_pdf;
        }
    }
</script>
</body>
